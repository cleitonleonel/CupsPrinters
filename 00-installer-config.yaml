network:
  version: 2
  renderer: NetworkManager
  ethernets:
    eth0:
      dhcp4: no
      addresses:
        - 192.168.0.250/24  # Primeiro IP
        - 192.168.15.250/24  # Segundo IP
      nameservers:
        addresses:
          - 8.8.8.8
          - 8.8.4.4
      routes:
        - to: 0.0.0.0/0
          via: 192.168.0.1
          metric: 100  # Prioridade maior (menor número = prioridade maior)
        - to: 0.0.0.0/0
          via: 192.168.15.1
          metric: 200  # Gateway secundário
